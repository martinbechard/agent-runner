components:
  - id: "CMP-001-cli-app"
    name: "Python command-line application"
    role: "Implements the hello-world command-line workflow, provides run documentation, and includes the single automated output verification path required by the feature set."
    technology: "python"
    runtime: "python3"
    frameworks: ["pytest"]
    persistence: "none"
    expected_expertise:
      - "Python 3 command-line application development"
      - "Basic project documentation for local developer workflows"
      - "Automated testing of standard-output behavior"
    features_served: ["FT-001", "FT-002", "FT-003"]
integration_points: []
rationale: |
  The decomposition stays as a single component because the source scope is a
  very small Python 3 command-line application with a README and exactly one
  automated test. Splitting the work into separate deployable or designable
  components would add boundaries that the requirements do not justify and
  would conflict with the explicit minimality and simplicity constraints.

  Python 3 is fixed by the requirements, and no persistence layer is needed
  because the application only prints a fixed string and exposes no long-lived
  state. The manifest names pytest as the framework because the feature set
  requires one automated test and a human-runnable test-suite path, while the
  constraints only forbid unnecessary frameworks rather than all frameworks.
  Using a single lightweight test framework keeps the implementation simple and
  consistent with a small Python project.

  No integration points are declared because the application, documentation,
  and test flow remain inside one coherent component with no external service,
  separate runtime boundary, or inter-component contract to manage.

e2e_tests:
  - id: "E2E-CLI-001"
    name: "Run the Python CLI application from the command line and verify stdout"
    feature_ref: "FT-001"
    acceptance_criteria_refs: ["AC-001-01", "AC-001-02", "AC-001-03"]
    type: "positive"
    setup:
      - step: "Start from a clean checkout of the project on a machine with Python 3 available on the command line."
      - step: "Locate the runnable application entry point identified by the repository's run path."
    actions:
      - step: "Invoke the application from a terminal using the documented Python 3 command."
      - step: "Capture standard output from the invocation."
    assertions:
      - "The project provides a Python 3 application entry point that can be invoked by a human from the command line."
      - "The invocation exits without requiring any non-command-line interaction."
      - "Standard output contains `Hello, world!`."

  - id: "E2E-CLI-002"
    name: "Verify the CLI output is exactly the expected hello-world line"
    feature_ref: "FT-001"
    acceptance_criteria_refs: ["AC-001-03"]
    type: "boundary"
    setup:
      - step: "Start from the same runnable project state used for manual CLI execution."
      - step: "Prepare to capture the full standard output stream exactly as emitted by the application."
    actions:
      - step: "Run the application from the command line once."
      - step: "Record the complete stdout payload including line endings."
    assertions:
      - "The emitted stdout is exactly one hello-world line with no additional application text before or after it."
      - "The observed output remains `Hello, world!` when compared as an exact expected-output check."

  - id: "E2E-DOC-001"
    name: "Review the README and follow its run instructions"
    feature_ref: "FT-002"
    acceptance_criteria_refs: ["AC-002-01", "AC-002-02"]
    type: "positive"
    setup:
      - step: "Open the repository root and locate the README artifact."
      - step: "Ensure Python 3 is available so the documented command can be followed exactly as written."
    actions:
      - step: "Read the README run-instructions section."
      - step: "Follow the documented command-line invocation from the README."
    assertions:
      - "A README artifact exists in the project."
      - "The README includes explicit run instructions for invoking the application from the command line."
      - "The documented invocation is sufficient for a human to run the application without consulting other artifacts."

  - id: "E2E-QA-001"
    name: "Run the automated test suite and confirm the single output-verification test passes"
    feature_ref: "FT-003"
    acceptance_criteria_refs: ["AC-003-01", "AC-003-02", "AC-003-03"]
    type: "positive"
    setup:
      - step: "Start from a clean checkout of the project with Python 3 and the declared test runner available."
      - step: "Locate the automated test suite invocation path provided by the project."
    actions:
      - step: "Run the project's test suite from the command line."
      - step: "Observe the reported test count and pass/fail result."
      - step: "Inspect the automated test definition to confirm the assertion target is the program's hello-world stdout."
    assertions:
      - "The project includes exactly one automated test in the test suite."
      - "That automated test verifies that the program prints `Hello, world!` as the expected output."
      - "A human can run the test suite and observe that the single automated test passes."


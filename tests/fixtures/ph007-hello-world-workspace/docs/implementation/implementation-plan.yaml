build_order:
  - step: 1
    component_ref: "CMP-001"
    rationale: "The CLI runtime is the core behavior that all other components depend on."
    contracts_implemented: ["CTR-002"]
    simulations_used: ["SIM-002"]
  - step: 2
    component_ref: "CMP-002"
    rationale: "README guidance depends on the stable invocation shape of the CLI runtime."
    contracts_implemented: ["CTR-001"]
    simulations_used: ["SIM-001"]
  - step: 3
    component_ref: "CMP-003"
    rationale: "The verification harness is finalized after the runtime and README contract are stable."
    contracts_implemented: []
    simulations_used: ["SIM-002"]
unit_test_plan:
  - component_ref: "CMP-001"
    tests:
      - name: "test_cli_emits_hello_world"
        description: "Verify that the CLI runtime emits the required stdout value."
        acceptance_criteria_refs: ["AC-001-01", "AC-001-02", "AC-001-03", "AC-001-04"]
        contract_ref: "CTR-002"
  - component_ref: "CMP-002"
    tests:
      - name: "test_readme_includes_run_instructions"
        description: "Verify that the README documents how to run the CLI runtime."
        acceptance_criteria_refs: ["AC-002-01", "AC-002-02", "AC-002-03"]
        contract_ref: "CTR-001"
  - component_ref: "CMP-003"
    tests:
      - name: "test_harness_verifies_expected_output"
        description: "Verify that the output verification harness asserts the expected CLI output."
        acceptance_criteria_refs: ["AC-003-01", "AC-003-02", "AC-003-03", "AC-003-04"]
        contract_ref: "CTR-002"
integration_test_plan:
  - name: "verify-readme-to-cli-alignment"
    components_involved: ["CMP-001", "CMP-002"]
    contracts_exercised: ["CTR-001"]
    scenarios_from: ["SIM-001"]
  - name: "verify-cli-output-through-test-harness"
    components_involved: ["CMP-001", "CMP-003"]
    contracts_exercised: ["CTR-002"]
    scenarios_from: ["SIM-002"]
simulation_replacement_sequence:
  - simulation_ref: "SIM-001"
    replaced_at_step: 2
    integration_tests_to_rerun: ["verify-readme-to-cli-alignment"]
  - simulation_ref: "SIM-002"
    replaced_at_step: 3
    integration_tests_to_rerun: ["verify-cli-output-through-test-harness"]
